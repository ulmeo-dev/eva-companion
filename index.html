    // ═══════════════════════════════════════════════
    //  EVA GraphQL API (via Cloudflare proxy)
    // ═══════════════════════════════════════════════
    const EVA_API = "https://green-salad-fcd5.ulmeo.workers.dev/";

    // Sequential fetch queue with retry on rate limit
    var _queue = [];
    var _processing = false;

    function _processQueue() {
      if (_processing || _queue.length === 0) return;
      _processing = true;
      var item = _queue.shift();
      _doFetch(item.body, item.resolve, item.reject, 0);
    }

    function _doFetch(body, resolve, reject, attempt) {
      fetch(EVA_API, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(body),
      }).then(function(res) {
        if (res.status === 429) {
          if (attempt < 3) {
            setTimeout(function() { _doFetch(body, resolve, reject, attempt + 1); }, 3000 * (attempt + 1));
            return;
          }
          reject(new Error("RATE_LIMITED"));
          _processing = false;
          setTimeout(_processQueue, 5000);
          return;
        }
        if (!res.ok) { reject(new Error("HTTP " + res.status)); _processing = false; setTimeout(_processQueue, 100); return; }
        res.json().then(function(json) {
          if (json.errors && json.errors[0]) {
            var code = json.errors[0].extensions && json.errors[0].extensions.code;
            if (code === "TOO_MANY_REQUESTS") {
              if (attempt < 3) {
                setTimeout(function() { _doFetch(body, resolve, reject, attempt + 1); }, 3000 * (attempt + 1));
                return;
              }
              reject(new Error("RATE_LIMITED"));
              _processing = false;
              setTimeout(_processQueue, 5000);
              return;
            }
          }
          if (json.error) { reject(new Error(json.error)); }
          else { resolve(json); }
          setTimeout(function() { _processing = false; _processQueue(); }, 100);
        });
      }).catch(function(e) {
        reject(e);
        _processing = false;
        setTimeout(_processQueue, 500);
      });
    }

    function evaFetch(body) {
      return new Promise(function(resolve, reject) {
        _queue.push({ body: body, resolve: resolve, reject: reject });
        _processQueue();
      });
    }

    function clearFetchQueue() {
      _queue.forEach(function(item) { item.reject(new Error("CANCELLED")); });
      _queue = [];
    }

    const SEASONS_QUERY = `query listSeasons {
      listSeasons {
        nodes { id from to seasonNumber active status name }
        itemCount
      }
    }`;

    async function fetchSeasons() {
      const json = await evaFetch({ operationName: "listSeasons", query: SEASONS_QUERY, variables: {} });
      return json.data?.listSeasons?.nodes || [];
    }

    function seasonLabel(s) {
      if (!s) return "";
      var num = "Saison " + s.seasonNumber;
      if (s.name && s.name.length > 0) num = "S" + s.seasonNumber + " " + s.name.charAt(0).toUpperCase() + s.name.slice(1);
      if (s.active) num += " (active)";
      return num;
    }

    function seasonShort(s) {
      if (!s) return "";
      if (s.name && s.name.length > 0) return "S" + s.seasonNumber + " " + s.name.charAt(0).toUpperCase() + s.name.slice(1);
      return "S" + s.seasonNumber;
    }

    const PROFILE_QUERY = `query getPublicPlayerByUsername($username: String!, $seasonId: Int, $includeStatistics: Boolean = false) {
      getPublicPlayerByUsername(username: $username) {
        id
        user { id username displayName }
        authorization { actions }
        seasonPass { active }
        experience(seasonId: $seasonId) {
          experience experienceForCurrentLevel experienceForNextLevel level
          levelProgressionPercentage seasonId
          authorization { actions }
        }
        ...PlayerStatisticsField @include(if: $includeStatistics)
      }
    }
    fragment PlayerStatisticsField on Player {
      statistics(seasonId: $seasonId) {
        gameId userId seasonId
        data {
          gameCount gameTime gameVictoryCount gameDefeatCount gameDrawCount
          inflictedDamage bestInflictedDamage kills deaths assists
          killDeathRatio killsByDeaths traveledDistance traveledDistanceAverage bestKillStreak
        }
      }
    }`;

    const HISTORY_QUERY = `query useAfterhGameHistoryPageLastOnly($userId: Int!, $seasonId: Int!) {

        data {
          duration outcome waveCount success generatorPercent puzzleFailedCount plasmaHitCount
          teamOne { score name }
          teamTwo { score name }
          round floor
        }
        players {
          id userId
          data {
            niceName rank team score outcome kills deaths assists
            inflictedDamage firedAccuracy totalKills
          }
        }
        terrain {
          id name
          location { id name department identifier country language status }
        }
        map {
          id name identifier maxPlayerCount isNew
          imageUrl backgroundImageUrl minimapImageUrl
          modeList { id identifier category }
        }
        mode { id identifier category }
      }
    }`;

    async function fetchProfile(username, seasonId) {
      const json = await evaFetch({
        operationName: "getPublicPlayerByUsername",
        query: PROFILE_QUERY,
        variables: { username, seasonId: seasonId, includeStatistics: true },
      });
      if (json.errors) throw new Error(json.errors[0]?.message || "GraphQL error");
      return json.data?.getPublicPlayerByUsername || null;
    }

    async function fetchHistory(userId, seasonId) {
      const json = await evaFetch({
        operationName: "useAfterhGameHistoryPageLastOnly",
        query: HISTORY_QUERY,
        variables: { userId, seasonId: seasonId },

      return json.data?.listLastAfterhGameHistoriesByUserAndSeason || [];

      var key = cacheKey("profile", username, seasonId);
      if (isSeasonCacheable(seasonId) && _dataCache[key]) {
        return _dataCache[key];

      var result = await fetchProfile(username, seasonId);
      if (result && isSeasonCacheable(seasonId)) {
        _dataCache[key] = result;

      return result;

    function App() {
      const [myTag, setMyTag] = useState(loadMyTag);

      const [searchResult, setSearchResult] = useState(null);
      const [searchLoading, setSearchLoading] = useState(false);
      const [searchTagA, setSearchTagA] = useState("");
      const [compareA, setCompareA] = useState(null);
      const [compareALoading, setCompareALoading] = useState(false);
      const [seasons, setSeasons] = useState([]);
      const [seasonId, setSeasonId] = useState(null);

      // Helper: get season number from id
      const getSeasonNumber = useCallback(function(sid) {
        var s = seasons.find(function(x) { return x.id === sid; });
        return s ? s.seasonNumber : sid;
      }, [seasons]);

      // Helper: safe profile fetch
      const safeFetchProfile = useCallback(async function(tag, sid) {
        if (!tag || !sid) return null;
        try {
          var p = await cachedFetchProfile(tag, sid);
          return p && p.user ? p : null;
        } catch(e) {
          if (e.message === "RATE_LIMITED" || e.message === "CANCELLED") throw e;
          console.error("fetchProfile error for " + tag, e);
          return null;
        }
      }, []);

      const safeFetchHistory = useCallback(async function(userId, sid) {
        if (!userId || !sid) return [];
        try {
          return await cachedFetchHistory(userId, sid) || [];
        } catch(e) {
          return [];
        }
      }, []);

      // Load seasons on mount
      useEffect(function() {
        fetchSeasons().then(function(list) {
          setSeasons(list);
          var active = list.find(function(s) { return s.active; });
          if (active) {
            _activeSeasonId = active.id;
            setSeasonId(active.id);
          } else if (list.length > 0) {
            setSeasonId(list[list.length - 1].id);
          }
        }).catch(function(e) { console.error("Failed to load seasons", e); });
      }, []);

      // SINGLE unified data loader - runs sequentially, never in parallel
      const myProfileRef = useRef(null);
      const prevSeasonRef = useRef(null);

      useEffect(function() {
        if (!myTag || !seasonId) return;
        var cancelled = false;

        if (prevSeasonRef.current !== null && prevSeasonRef.current !== seasonId) {
          clearFetchQueue();
        }
        prevSeasonRef.current = seasonId;

        async function loadAll() {
          // Step 1: Always load own profile
          setLoading(true);
          try {
            var p = await safeFetchProfile(myTag, seasonId);
            if (cancelled) return;
            if (p) { myProfileRef.current = p; setMyProfile(p); }
            else if (myProfileRef.current) {
              setMyProfile(Object.assign({}, myProfileRef.current, { statistics: null, experience: null }));
            }
            var h = (p && p.user) ? await safeFetchHistory(p.user.id, seasonId) : [];
            if (!cancelled) setMyHistory(h || []);
          } catch(e) {}
          if (!cancelled) setLoading(false);

          // Step 2: Load friend if viewing one
          if (!cancelled && friendTag && subTab === "profile") {
            setFriendLoading(true);
            try {
              var fp = await safeFetchProfile(friendTag, seasonId);
              if (cancelled) return;
              if (fp) setFriendProfile(fp);
              else setFriendProfile(function(prev) {
                return prev && prev.user ? Object.assign({}, prev, { statistics: null, experience: null }) : prev;
              });
              var fh = (fp && fp.user) ? await safeFetchHistory(fp.user.id, seasonId) : [];
              if (!cancelled) setFriendHistory(fh || []);
            } catch(e) {}
            if (!cancelled) setFriendLoading(false);
          }

          // Step 3: Load compare A if selected
          if (!cancelled && searchTagA && compareA) {
            setCompareALoading(true);
            try {
              var ca = await safeFetchProfile(searchTagA, seasonId);
              if (cancelled) return;
              if (ca) setCompareA(ca);
              else setCompareA(function(prev) {
                return prev && prev.user ? Object.assign({}, prev, { statistics: null, experience: null }) : prev;
              });
            } catch(e) {}
            if (!cancelled) setCompareALoading(false);
          }

          // Step 4: Load compare B if selected
          if (!cancelled && searchTag && searchResult) {
            setSearchLoading(true);
            try {
              var cb = await safeFetchProfile(searchTag, seasonId);
              if (cancelled) return;
              if (cb) setSearchResult(cb);
              else setSearchResult(function(prev) {
                return prev && prev.user ? Object.assign({}, prev, { statistics: null, experience: null }) : prev;
              });
            } catch(e) {}
            if (!cancelled) setSearchLoading(false);
          }
        }

        loadAll();
        return function() { cancelled = true; };
      }, [myTag, seasonId]);

      // Load friend profile on click
      const loadFriend = useCallback(function(f) {
        if (friendTag === f.tag && friendProfile) return; // Already loaded
        setFriendTag(f.tag);
        setSubTab("profile");
        setFriendLoading(true);
        setFriendProfile(null);
        setFriendHistory([]);
        safeFetchProfile(f.tag, seasonId).then(function(p) {
          setFriendProfile(p);
          return p && p.user ? safeFetchHistory(p.user.id, seasonId) : [];
        }).then(function(h) {
          setFriendHistory(h || []);
        }).finally(function() {
          setFriendLoading(false);
        });
      }, [seasonId, friendTag, friendProfile]);

      const addFriend = useCallback(function(f) {
        var u = friends.concat([f]); setFriends(u); saveFriends(u);
      }, [friends]);

      const removeFriend = useCallback(function(i) {
        var u = friends.filter(function(_,j){return j!==i;}); setFriends(u); saveFriends(u);
      }, [friends]);

      // Compare search handler with validation
      const doCompareSearch = useCallback(function(tag, setter, loadingSetter) {
        var t = (tag || "").trim();
        if (!t || !seasonId) return;
        if (!t.includes("#")) { return; }
        loadingSetter(true);
        safeFetchProfile(t, seasonId).then(function(p) {
          setter(p);
        }).finally(function() {
          loadingSetter(false);
        });
      }, [seasonId]);

      const handleSearchA = useCallback(function() {
        doCompareSearch(searchTagA, setCompareA, setCompareALoading);
      }, [searchTagA, doCompareSearch]);

      const handleSearchB = useCallback(function() {
        doCompareSearch(searchTag, setSearchResult, setSearchLoading);
      }, [searchTag, doCompareSearch]);

      if (!myTag) return React.createElement(SetupScreen, { onDone: setMyTag });

      return React.createElement("div", { className:"app-shell", style: {
        background:P.bg, color:P.text, fontFamily:F.main
      }},

        // ── Desktop Sidebar ──
        React.createElement("div", { className:"app-sidebar" },
          // Sidebar header
          React.createElement("div", { style: { padding:"16px 20px 20px" } },
            React.createElement("div", { style: { display:"flex", alignItems:"baseline", gap:6 } },
              React.createElement("span", { style: {
                fontSize:22, fontWeight:800, fontFamily:F.title,
                background:`linear-gradient(90deg, ${P.accent}, #0088a0)`,
                WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"
              }}, "EVA"),
              React.createElement("span", { style: { fontSize:13, color:P.textDim, fontFamily:F.mono } }, "companion")
            ),
            React.createElement("div", { style: { fontSize:10, color:P.textDim, fontFamily:F.mono, opacity:0.5, marginTop:2 } },
              "by Ulmeo" + (seasonId && seasons.length ? " • " + (function(){ var s=seasons.find(function(x){return x.id===seasonId;}); return s ? seasonShort(s) : ""; })() : "")
            )
          ),
          // Sidebar nav items
          React.createElement("div", { style: { flex:1, padding:"0 10px" } },
            TABS.map(function(t) {
              var active = tab === t.id;
              return React.createElement("button", {
                key:t.id,
                onClick: function() { setTab(t.id); if(t.id==="friends") setSubTab("list"); },
                style: {
                  display:"flex", alignItems:"center", gap:10, width:"100%",
                  padding:"10px 14px", marginBottom:4, borderRadius:8,
                  background: active ? P.accentDim : "transparent",
                  border: active ? "1px solid "+P.accent+"33" : "1px solid transparent",
                  color: active ? P.accent : P.textSec,
                  fontFamily:F.mono, fontSize:13, fontWeight: active ? 700 : 400,
                  transition:"all 0.2s", textAlign:"left"
                }
              },
                React.createElement("span", { style: { fontSize:18 } }, t.icon),
                React.createElement("span", null, t.label)
              );
            })
          ),
          // Sidebar footer
          React.createElement("div", { style: { padding:"12px 20px", borderTop:"1px solid "+P.border, fontSize:10, color:P.textDim, fontFamily:F.mono } },
            myProfile ? myProfile.user.displayName + " • LVL " + (myProfile.experience?.level || "?") : myTag
          )
        ),

        // ── Main column ──
        React.createElement("div", { style: { flex:1, display:"flex", flexDirection:"column", height:"100vh", overflow:"hidden" } },

          // Mobile header
          React.createElement("div", { className:"app-header-mobile", style: {
            padding:"max(44px, env(safe-area-inset-top)) 16px 10px", background:P.surface,
            borderBottom:`1px solid ${P.border}`, flexShrink:0
          }},
            React.createElement("div", { style: { display:"flex", alignItems:"center", justifyContent:"space-between" } },
              React.createElement("div", { style: { display:"flex", alignItems:"baseline", gap: 6 } },
                React.createElement("span", { style: {
                  fontSize:20, fontWeight:800, fontFamily:F.title,
                  background:`linear-gradient(90deg, ${P.accent}, #0088a0)`,
                  WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"
                }}, "EVA"),
                React.createElement("span", { style: { fontSize:14, color:P.textDim, fontFamily:F.mono } }, "companion"),
                React.createElement("span", { style: { fontSize:10, color:P.textDim, fontFamily:F.mono, opacity:0.5 } }, "by Ulmeo")
              ),
              React.createElement("span", { style: { fontSize:10, color:P.textDim, fontFamily:F.mono } },
                seasonId && seasons.length ? (function(){ var s=seasons.find(function(x){return x.id===seasonId;}); return s ? "S"+s.seasonNumber : ""; })() : ""
              )
            )
          ),

          // Content
          React.createElement("div", { className:"app-content", style: { flex:1, padding:16, paddingBottom:100, overflowY:"auto", WebkitOverflowScrolling:"touch", width:"100%" } },

          // Season selector (shown on all tabs except info)
          tab !== "info" && seasons.length > 0 && React.createElement(SeasonSelector, { seasons:seasons, selectedId:seasonId, onChange:setSeasonId }),

          tab === "profile" && React.createElement(ProfileView, { data:myProfile, history:myHistory, loading:loading, seasons:seasons, currentSeasonId:seasonId }),

          tab === "friends" && (
            subTab === "profile"
              ? React.createElement("div", null,
                  React.createElement("button", {
                    onClick: function() { setSubTab("list"); setFriendTag(null); setFriendProfile(null); setFriendHistory([]); },
                    style: { background:"none", border:"none", color:P.accent, fontFamily:F.mono, fontSize:13, padding:"4px 0", marginBottom:12, display:"flex", alignItems:"center", gap:4 }
                  }, "← Retour"),
                  React.createElement(ProfileView, { data:friendProfile, history:friendHistory, loading:friendLoading, seasons:seasons, currentSeasonId:seasonId })
                )
              : React.createElement(FriendsView, { friends:friends, onSelect:loadFriend, onRemove:removeFriend, onAdd:addFriend })
          ),

          tab === "compare" && React.createElement("div", null,
            React.createElement("div", { style: { background:P.surface, borderRadius:12, padding:16, marginBottom:16, border:"1px solid "+P.border } },
              React.createElement("div", { style: { fontSize:12, fontWeight:700, color:P.textSec, marginBottom:10, fontFamily:F.mono, textTransform:"uppercase", letterSpacing:1 } }, "Comparer deux joueurs"),

              // Player 1
              React.createElement("div", { style: { fontSize:12, color:P.textDim, marginBottom:4, fontFamily:F.mono } }, "Joueur 1"),
              React.createElement("div", { style: { display:"flex", gap:6, marginBottom:4 } },
                React.createElement("input", {
                  value:searchTagA, onChange:function(e){setSearchTagA(e.target.value);},
                  placeholder:"Tag EVA (ex: Pseudo#123456)",
                  style: { flex:1, padding:"10px 12px", background:P.surfaceLight, border:"1px solid "+P.border, borderRadius:8, color:P.text, fontFamily:F.mono, fontSize:13 },
                  onKeyDown: function(e){ if(e.key==="Enter") handleSearchA(); }
                }),
                React.createElement("button", {
                  onClick: handleSearchA,
                  disabled: compareALoading || !searchTagA.trim(),
                  style: {
                    padding:"10px 14px", background: compareALoading ? P.surfaceHover : P.accent,
                    color:P.bg, border:"none", borderRadius:8, fontWeight:800, fontFamily:F.main, fontSize:13,
                    opacity: compareALoading || !searchTagA.trim() ? 0.5 : 1
                  }
                }, compareALoading ? "..." : "GO")
              ),
              // Quick pick Player 1
              React.createElement("div", { style: { display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 } },
                React.createElement("button", {
                  onClick: function(){ if (compareA && compareA.user && compareA.user.username === myTag) return; setSearchTagA(myTag); setCompareA(myProfile); },
                  disabled: compareA && compareA.user && compareA.user.username === myTag,
                  style: { padding:"4px 8px", background: compareA && compareA.user && compareA.user.username === myTag ? P.accent+"33" : P.accentDim, border:"1px solid "+P.accent+"33", borderRadius:6, color:P.accent, fontSize:10, fontFamily:F.mono, fontWeight:700, opacity: compareA && compareA.user && compareA.user.username === myTag ? 0.5 : 1 }
                }, "Moi"),
                friends.map(function(f,i) {
                  var isSelected = compareA && compareA.user && compareA.user.username === f.tag;
                  return React.createElement("button", {
                    key:"a"+i,
                    disabled: isSelected || compareALoading,
                    onClick: function() { if (isSelected) return; setSearchTagA(f.tag); doCompareSearch(f.tag, setCompareA, setCompareALoading); },
                    style: { padding:"4px 8px", background: isSelected ? P.accent+"33" : P.surfaceHover, border:"1px solid "+P.border, borderRadius:6, color: isSelected ? P.accent : P.textSec, fontSize:10, fontFamily:F.mono, opacity: isSelected ? 0.5 : 1 }
                  }, f.name);
                })
              ),
              compareA && compareA.user && React.createElement("div", { style: { padding:"6px 10px", background:P.surfaceLight, borderRadius:6, marginBottom:12, color:P.accent, fontFamily:F.mono, fontSize:12, display:"flex", alignItems:"center", gap:6 } },
                React.createElement("span", null, "✓"),
                React.createElement("span", null, compareA.user.displayName + (compareA.experience ? " (LVL " + compareA.experience.level + ")" : ""))
              ),

              // Player 2
              React.createElement("div", { style: { fontSize:12, color:P.textDim, marginBottom:4, fontFamily:F.mono } }, "Joueur 2"),
              React.createElement("div", { style: { display:"flex", gap:6, marginBottom:4 } },
                React.createElement("input", {
                  value:searchTag, onChange:function(e){setSearchTag(e.target.value);},
                  placeholder:"Tag EVA (ex: Pseudo#123456)",
                  style: { flex:1, padding:"10px 12px", background:P.surfaceLight, border:"1px solid "+P.border, borderRadius:8, color:P.text, fontFamily:F.mono, fontSize:13 },
                  onKeyDown: function(e){ if(e.key==="Enter") handleSearchB(); }
                }),
                React.createElement("button", {
                  onClick: handleSearchB,
                  disabled: searchLoading || !searchTag.trim(),
                  style: {
                    padding:"10px 14px", background: searchLoading ? P.surfaceHover : P.accent,
                    color:P.bg, border:"none", borderRadius:8, fontWeight:800, fontFamily:F.main, fontSize:13,
                    opacity: searchLoading || !searchTag.trim() ? 0.5 : 1
                  }
                }, searchLoading ? "..." : "GO")
              ),
              // Quick pick Player 2
              React.createElement("div", { style: { display:"flex", gap:6, flexWrap:"wrap" } },
                React.createElement("button", {
                  onClick: function(){ if (searchResult && searchResult.user && searchResult.user.username === myTag) return; setSearchTag(myTag); setSearchResult(myProfile); },
                  disabled: searchResult && searchResult.user && searchResult.user.username === myTag,
                  style: { padding:"4px 8px", background: searchResult && searchResult.user && searchResult.user.username === myTag ? P.accent+"33" : P.accentDim, border:"1px solid "+P.accent+"33", borderRadius:6, color:P.accent, fontSize:10, fontFamily:F.mono, fontWeight:700, opacity: searchResult && searchResult.user && searchResult.user.username === myTag ? 0.5 : 1 }
                }, "Moi"),
                friends.map(function(f,i) {
                  var isSelected = searchResult && searchResult.user && searchResult.user.username === f.tag;
                  return React.createElement("button", {
                    key:"b"+i,
                    disabled: isSelected || searchLoading,
                    onClick: function() { if (isSelected) return; setSearchTag(f.tag); doCompareSearch(f.tag, setSearchResult, setSearchLoading); },
                    style: { padding:"4px 8px", background: isSelected ? P.accent+"33" : P.surfaceHover, border:"1px solid "+P.border, borderRadius:6, color: isSelected ? P.accent : P.textSec, fontSize:10, fontFamily:F.mono, opacity: isSelected ? 0.5 : 1 }
                  }, f.name);
                })
              ),
              searchResult && searchResult.user && React.createElement("div", { style: { padding:"6px 10px", background:P.surfaceLight, borderRadius:6, marginTop:6, color:P.lose, fontFamily:F.mono, fontSize:12, display:"flex", alignItems:"center", gap:6 } },
                React.createElement("span", null, "✓"),
                React.createElement("span", null, searchResult.user.displayName + (searchResult.experience ? " (LVL " + searchResult.experience.level + ")" : ""))
              )
            ),
            (compareALoading || searchLoading) && React.createElement(Spinner),
            compareA && compareA.user && searchResult && searchResult.user && React.createElement(CompareView, { a:compareA, b:searchResult }),
            (!compareA || !searchResult) && !compareALoading && !searchLoading && React.createElement(Empty, { text:"Sélectionnez les deux joueurs ci-dessus" })
          ),

          tab === "info" && React.createElement(InfoView)
        ),

        // Mobile Tab bar
        React.createElement("div", { className:"app-tabbar", style: {
          position:"fixed", bottom:0, left:0, right:0,
          background:P.surface, borderTop:`1px solid ${P.border}`,
          justifyContent:"center",
          padding:"4px 0 max(4px, env(safe-area-inset-bottom))",
          zIndex:100
        }},
          React.createElement("div", { style: { display:"flex", maxWidth:480, width:"100%", justifyContent:"space-around", margin:"0 auto" } },
            ...TABS.map(t => {
              const active = tab === t.id;
              return React.createElement("button", {
                key:t.id, onClick: () => { setTab(t.id); if(t.id==="friends") setSubTab("list"); },
                style: { background:"none", border:"none", padding:"5px 12px", display:"flex", flexDirection:"column", alignItems:"center", gap:1, opacity:active?1:0.5, transition:"all 0.2s" }
              },
                React.createElement("span", { style: { fontSize:16 } }, t.icon),
                React.createElement("span", { style: { fontSize:9, fontFamily:F.mono, letterSpacing:1, color:active?P.accent:P.textDim, fontWeight:active?700:400 } }, t.label),
                active && React.createElement("div", { style: { width:16, height:2, borderRadius:1, background:P.accent, marginTop:1, boxShadow:`0 0 6px ${P.accentGlow}` } })
              );
            })
          )
        )

        ), // close main column
      ); // close app-shell
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
