<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EVA-Companion" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>EVA-Companion</title>

  <!-- App Icon -->
  <link rel="apple-touch-icon" href="./data/logo.png" />
  <link rel="icon" type="image/png" href="./data/logo.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiRVZBLUNvbXBhbmlvbiIsInNob3J0X25hbWUiOiJFVkEtQ29tcGFuaW9uIiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwYTBhMGYiLCJ0aGVtZV9jb2xvciI6IiMwMGU1ZmYifQ==" />

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").then(function(reg) {
        reg.update();
        reg.addEventListener("updatefound", function() {
          var newSW = reg.installing;
          newSW.addEventListener("statechange", function() {
            if (newSW.state === "activated") window.location.reload();
          });
        });
      }).catch(function() {});
    }
  </script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@700;800&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; width: 100%; background: #0a0a0f; overflow: hidden; }
    body { font-family: 'Rajdhani', sans-serif; -webkit-font-smoothing: antialiased; }
    input:focus { outline: none; }
    button { cursor: pointer; }
    button:active { opacity: 0.8; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }

    /* Layout */
    .app-shell { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
    .app-sidebar { display: none; }
    .app-tabbar { display: flex; }
    .tab-list-img { width: 52px; height: 52px; }

    /* Desktop / tablet */
    @media (min-width: 768px) {
      .app-shell { max-width: 100%; margin: 0; flex-direction: row; }
      .app-sidebar { display: flex; flex-direction: column; width: 220px; min-width: 220px;
        background: #12121a; border-right: 1px solid #2a2a3a; padding-top: max(44px, env(safe-area-inset-top)); }
      .app-tabbar { display: none !important; }
      .app-header-mobile { display: none !important; }
      .app-content { max-width: 600px; margin: 0 auto; padding-top: 16px !important; }
    }

    @media (min-width: 1200px) {
      .app-content { max-width: 700px; }
    }

    /* Mobile landscape */
    @media (max-width: 767px) and (orientation: landscape) {
      .app-shell { max-width: 100%; flex-direction: row; }
      .app-sidebar { display: flex; flex-direction: column; width: 140px; min-width: 140px;
        background: #12121a; border-right: 1px solid #2a2a3a; padding-top: max(8px, env(safe-area-inset-top)); }
      .app-sidebar .sidebar-header { display: none; }
      .app-sidebar > div:last-child { display: none; }
      .app-tabbar { display: none !important; }
      .app-header-mobile { display: none !important; }
      .app-content { max-width: 600px; margin: 0 auto; padding-top: 8px !important; }
    }
  </style>

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- App Modules (plain JS, no Babel needed) -->
  <script src="js/core.js"></script>
  <script src="js/profil.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/look4pvp.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
